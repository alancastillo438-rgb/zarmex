  <!-- ================= NAVBAR ================= -->

    <div class="logo">
        <img src="https://www.zarmexoficial.com/imagenes/1742439791_Captura%20de%20pantalla%202025-01-19%20134751.png" alt="Zarmex Logo">
    </div>
    <nav class="nav-links">
        <a href="index.html">Inicio</a>
        <div class="dropdown">
            <a href="#" class="dropdown-btn">Productos ▾</a>
            <div class="dropdown-content">
                <a href="Quiropractica.html">Quiropráctica</a>
                <a href="psicologia.html">Fisioterapia</a>
                <a href="psicologia.html">Ginecología</a>

    </nav>
    <div class="hamburger"><span></span><span></span><span></span></div>
</header>


<div class="contenedor">
    <h1>Solicitud de Reparación</h1>

    <form>
        <div class="campo">
            <label>Nombre</label>
            <input type="text" required />
        </div>
        <div class="campo">
            <label>Ocupación</label>
            <input type="text" required />
        </div>

        <div class="campo">
            <label>Tipo de máquina</label>
            <select id="tipo_maquina" required>
                <option value="">Seleccione una categoría</option>
                <option value="ZAR-CQP">Quiropráctica</option>
                <option value="ZAR-FTA">Fisioterapia</option>
                <option value="ZAR-GNA">Ginecología</option>
                <option value="ZAR-OTN">Otorrinolaringología</option>
                <option value="ZAR-PDA">Podología</option>
            </select>
        </div>

        <div class="campo">
            <label>Código del equipo</label>
            <select id="codigo_equipo" required>
                <option value="">Seleccione un equipo</option>
            </select>
        </div>

        <div class="campo">
            <label>Descripción del problema</label>
            <textarea rows="4" required></textarea>
        </div>
        <div class="campo">
            <label>Dirección:</label>
            <input type="text" required />
        </div>
        <div class="campo">
            <label>Estado:</label>
            <input type="text" required />
        </div>
        <div class="campo">
            <label>Código postal:</label>
            <input type="text" required />
        </div>
        <div class="campo">
            <label>Correo electrónico:</label>
            <input type="email" required />
        </div>
        <div class="campo">
            <label>Número de celular:</label>
            <input type="tel" required />
        </div>

        <button type="submit">Enviar</button>
    </form>
</div>

<script src="mantenimiento.js"></script>
</body>
</html>
